<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AgentDesk</title>
  <style>
    :root { --bg:#0f1115; --panel:#171a21; --line:#262b36; --text:#e8eaf0;
            --dim:#8b93a7; --accent:#6ea8fe; --good:#4ade80; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--text);
           font:15px/1.5 system-ui, -apple-system, Segoe UI, sans-serif; }
    #root { max-width: 780px; margin: 0 auto; padding: 24px 16px 120px; }
    h1 { font-size: 20px; letter-spacing:.3px; }
    h1 span { color: var(--accent); }
    .sub { color: var(--dim); font-size: 13px; margin-top:-8px; }
    .msg { border:1px solid var(--line); border-radius:12px; padding:12px 14px;
           margin:10px 0; background:var(--panel); }
    .msg.user { border-color:#31405e; }
    .role { font-size:11px; text-transform:uppercase; letter-spacing:.12em;
            color:var(--dim); margin-bottom:4px; }
    .meta { margin-top:10px; padding-top:8px; border-top:1px dashed var(--line);
            font-size:12.5px; color:var(--dim); }
    .meta b { color:var(--text); font-weight:600; }
    .chip { display:inline-block; background:#1f2735; border-radius:999px;
            padding:1px 9px; margin:2px 3px; font-size:12px; color:var(--accent); }
    .tool { color: var(--good); }
    form { position:fixed; bottom:0; left:0; right:0; background:var(--bg);
           border-top:1px solid var(--line); padding:14px 16px; }
    .row { max-width:780px; margin:0 auto; display:flex; gap:8px; }
    input { flex:1; background:var(--panel); border:1px solid var(--line);
            color:var(--text); border-radius:10px; padding:11px 14px; font-size:15px; }
    input:focus { outline:none; border-color:var(--accent); }
    button { background:var(--accent); color:#0b1020; font-weight:600; border:none;
             border-radius:10px; padding:0 18px; cursor:pointer; }
    button:disabled { opacity:.5; cursor:default; }
    .thinking { color:var(--dim); font-style:italic; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./app.js"></script>
</body>
</html>
